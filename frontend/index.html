<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#070708" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BarberPro Premium</title>
    <meta name="description" content="SaaS elite de gestão e agendamento para barbearias premium." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #070708; }
      #root { height: 100%; }

      /* Loading screen — aparece imediatamente, some quando React monta */
      #app-loading {
        position: fixed;
        inset: 0;
        background: #070708;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #app-loading.hide {
        opacity: 0;
        pointer-events: none;
      }
      .bp-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #8A6A3D, #D6C29A);
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bp-logo-inner {
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      .bp-title {
        font-family: Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2em;
        color: #fff;
        text-transform: uppercase;
      }
      .bp-sub {
        font-family: monospace;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: #B08D57;
        text-transform: uppercase;
        margin-top: -12px;
      }
      .bp-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(176,141,87,0.2);
        border-top-color: #B08D57;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 8px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading instantâneo (CSS puro, sem JS) -->
    <div id="app-loading">
      <div class="bp-logo">
        <div class="bp-logo-inner">✂️</div>
      </div>
      <div class="bp-title">BarberPro</div>
      <div class="bp-sub">Premium</div>
      <div class="bp-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loading screen quando o React montar
      window.__removeLoading = function() {
        var el = document.getElementById('app-loading');
        if (el) {
          el.classList.add('hide');
          setTimeout(function() { el.remove(); }, 400);
        }
      };
    </script>
  </body>
</html>
